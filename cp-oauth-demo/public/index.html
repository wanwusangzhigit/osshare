<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP OAuth 登录演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .user-info {
            display: none;
        }

        .user-info.show {
            display: block;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }

        .user-details h2 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-details p {
            color: #666;
        }

        .info-section {
            margin-bottom: 25px;
        }

        .info-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-card label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-card value {
            display: block;
            color: #333;
            font-weight: 500;
            margin-top: 5px;
            word-break: break-all;
        }

        .platform-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .platform-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .platform-item strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .platform-item span {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #ff3344;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #ffe6e6;
            color: #cc0000;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .token-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
        }

        .token-info code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 CP OAuth 登录演示</h1>
        <p class="subtitle">使用竞赛编程账号安全登录</p>

        <div id="error" class="error"></div>

        <!-- 登录按钮 -->
        <div id="loginSection">
            <button class="login-btn" onclick="handleLogin()">
                🔐 使用 CP OAuth 登录
            </button>
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display: none;">
            <p>⏳ 正在处理登录...</p>
        </div>

        <!-- 用户信息 -->
        <div id="userInfo" class="user-info">
            <div class="profile-header">
                <img id="avatar" class="avatar" src="" alt="Avatar">
                <div class="user-details">
                    <h2 id="displayName"></h2>
                    <p id="username"></p>
                </div>
            </div>

            <div class="info-section">
                <h3>📋 基本信息</h3>
                <div class="info-grid">
                    <div class="info-card">
                        <label>用户 ID</label>
                        <value id="userId"></value>
                    </div>
                    <div class="info-card">
                        <label>用户名</label>
                        <value id="infoUsername"></value>
                    </div>
                    <div class="info-card">
                        <label>显示名称</label>
                        <value id="infoDisplayName"></value>
                    </div>
                    <div class="info-card">
                        <label>邮箱</label>
                        <value id="email"></value>
                    </div>
                    <div class="info-card" style="grid-column: 1 / -1;">
                        <label>个人简介</label>
                        <value id="bio"></value>
                    </div>
                </div>
            </div>

            <div class="info-section">
                <h3>🎮 关联平台账号</h3>
                <div id="platformList" class="platform-list"></div>
            </div>

            <div class="info-section">
                <h3>📊 竞赛数据</h3>
                <div class="info-grid">
                    <div class="info-card">
                        <label>概要信息</label>
                        <value id="cpSummary"></value>
                    </div>
                    <div class="info-card" style="grid-column: 1 / -1;">
                        <label>详细信息</label>
                        <value id="cpDetails"></value>
                    </div>
                </div>
            </div>

            <div class="token-info">
                <strong>⚠️ 令牌信息（仅用于演示，生产环境请勿暴露）</strong><br>
                Access Token 过期时间：<code id="tokenExpires"></code><br>
                Token 类型：<code id="tokenType"></code>
            </div>

            <button class="logout-btn" onclick="handleLogout()">
                🚪 退出登录
            </button>
        </div>
    </div>

    <script>
        // 配置 - 请替换为你的实际 Client ID
        const CLIENT_ID = 'YOUR_CLIENT_ID'; // 从 https://www.cpoauth.com/ 获取
        const REDIRECT_URI = window.location.origin + '/callback';
        const SCOPE = 'openid profile email cp:linked cp:summary cp:details link:luogu link:atcoder link:codeforces link:github link:google';

        // 生成随机字符串用于 PKCE
        function generateRandomString(length) {
            const array = new Uint8Array(length);
            crypto.getRandomValues(array);
            return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
        }

        // 生成 SHA-256 哈希
        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            
            // Base64URL 编码
            const base64 = btoa(String.fromCharCode(...new Uint8Array(digest)));
            return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // 存储 PKCE 验证器到 sessionStorage
        function storePKCEState(verifier, state) {
            sessionStorage.setItem('pkce_verifier', verifier);
            sessionStorage.setItem('oauth_state', state);
        }

        // 获取存储的 PKCE 验证器
        function getPKCEState() {
            const verifier = sessionStorage.getItem('pkce_verifier');
            const state = sessionStorage.getItem('oauth_state');
            return { verifier, state };
        }

        // 清除 PKCE 状态
        function clearPKCEState() {
            sessionStorage.removeItem('pkce_verifier');
            sessionStorage.removeItem('oauth_state');
        }

        // 显示错误信息
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        // 处理登录
        async function handleLogin() {
            try {
                // 生成 PKCE 参数
                const codeVerifier = generateRandomString(64);
                const codeChallenge = await generateCodeChallenge(codeVerifier);
                const state = generateRandomString(32);

                // 存储状态
                storePKCEState(codeVerifier, state);

                // 构建授权 URL
                const authUrl = new URL('https://www.cpoauth.com/api/oauth/authorize');
                authUrl.searchParams.set('response_type', 'code');
                authUrl.searchParams.set('client_id', CLIENT_ID);
                authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
                authUrl.searchParams.set('scope', SCOPE);
                authUrl.searchParams.set('state', state);
                authUrl.searchParams.set('code_challenge', codeChallenge);
                authUrl.searchParams.set('code_challenge_method', 'S256');

                // 重定向到授权页面
                window.location.href = authUrl.toString();
            } catch (error) {
                console.error('Login error:', error);
                showError('登录初始化失败：' + error.message);
            }
        }

        // 处理回调
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            if (error) {
                showError('授权失败：' + urlParams.get('error_description') || error);
                clearPKCEState();
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (!code) {
                return; // 不是回调请求
            }

            // 验证 state
            const storedState = sessionStorage.getItem('oauth_state');
            if (state !== storedState) {
                showError('State 验证失败，可能存在 CSRF 攻击');
                clearPKCEState();
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            // 获取 code_verifier
            const codeVerifier = sessionStorage.getItem('pkce_verifier');
            if (!codeVerifier) {
                showError('PKCE 验证器丢失，请重新登录');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            // 显示加载状态
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                // 发送授权码到后端交换 token
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: code,
                        code_verifier: codeVerifier,
                    }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '登录失败');
                }

                const data = await response.json();
                
                // 存储 tokens（生产环境应该更安全地存储）
                localStorage.setItem('access_token', data.tokens.access_token);
                localStorage.setItem('refresh_token', data.tokens.refresh_token);
                localStorage.setItem('token_expires', Date.now() + data.tokens.expires_in * 1000);

                // 显示用户信息
                displayUserInfo(data.user, data.tokens);
                
                // 清理 URL
                clearPKCEState();
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (error) {
                console.error('Callback error:', error);
                showError('登录处理失败：' + error.message);
                document.getElementById('loginSection').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 显示用户信息
        function displayUserInfo(user, tokens) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').classList.add('show');

            // 基本信息
            document.getElementById('avatar').src = user.avatar_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23667eea"/></svg>';
            document.getElementById('displayName').textContent = user.display_name || user.username || 'Unknown';
            document.getElementById('username').textContent = '@' + (user.username || 'unknown');
            document.getElementById('userId').textContent = user.sub || 'N/A';
            document.getElementById('infoUsername').textContent = user.username || 'N/A';
            document.getElementById('infoDisplayName').textContent = user.display_name || 'N/A';
            document.getElementById('email').textContent = user.email?.address || '未提供';
            document.getElementById('bio').textContent = user.bio || '暂无简介';

            // 关联平台
            const platformList = document.getElementById('platformList');
            platformList.innerHTML = '';
            
            if (user.cp_linked && Array.isArray(user.cp_linked)) {
                user.cp_linked.forEach(platform => {
                    const item = document.createElement('div');
                    item.className = 'platform-item';
                    item.innerHTML = `
                        <strong>${platform.platform || 'Unknown'}</strong>
                        <span>${platform.username || platform.uid || 'N/A'}</span>
                    `;
                    platformList.appendChild(item);
                });
            } else {
                platformList.innerHTML = '<p style="color: #666; grid-column: 1 / -1;">未关联任何平台</p>';
            }

            // 竞赛数据
            document.getElementById('cpSummary').textContent = user.cp_summary ? '已获取' : '未授权或未绑定 Clist.by';
            document.getElementById('cpDetails').textContent = user.cp_details ? '已获取' : '未授权或未绑定 Clist.by';

            // Token 信息
            const expiresDate = new Date(Date.now() + tokens.expires_in * 1000);
            document.getElementById('tokenExpires').textContent = expiresDate.toLocaleString();
            document.getElementById('tokenType').textContent = tokens.token_type;
        }

        // 处理登出
        function handleLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('token_expires');
            
            document.getElementById('userInfo').classList.remove('show');
            document.getElementById('loginSection').style.display = 'block';
        }

        // 检查是否已登录
        function checkExistingSession() {
            const accessToken = localStorage.getItem('access_token');
            const tokenExpires = localStorage.getItem('token_expires');
            
            if (accessToken && tokenExpires && Date.now() < parseInt(tokenExpires)) {
                // Token 仍然有效，可以尝试获取用户信息
                // 简化处理：直接显示登录按钮，让用户重新登录
                return false;
            }
            
            // Token 过期或不存在
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('token_expires');
            return false;
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 检查是否是回调
            if (window.location.search.includes('code=')) {
                handleCallback();
            } else {
                checkExistingSession();
            }
        });
    </script>
</body>
</html>
